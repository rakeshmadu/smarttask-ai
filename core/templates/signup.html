<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
</head>
<body style="background:#0f172a; color:white; text-align:center;">

    <h1>Create Account</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Sign Up</button>
    </form>

    <p>Already have account?</p>
    <a href="/login/">Login</a>

</body>
</html>
